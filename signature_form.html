<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>참석 확인서 - 서명 양식</title>
<link rel="icon" href="https://hyunra94.github.io/assets/favicon.png">
<meta property="og:image" content="https://hyunra94.github.io/assets/og-default.png">
<meta property="og:url" content="https://hyunra94.github.io/[레포명]/">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.1.7/signature_pad.umd.min.js"></script>
<style>
  :root {
    --bg-1: #FFF0F5;
    --bg-2: #FFE4E1;
    --accent: #F7B8C4;
    --accent-dark: #E88FA2;
    --lavender: #E6E0F8;
    --text: #5A4A50;
    --white: #FFFFFF;
    --shadow: rgba(232, 143, 162, 0.25);
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
    margin: 0;
    padding: 24px 16px;
    color: var(--text);
    min-height: 100vh;
    -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  input, textarea {
    -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text;
  }

  .card {
    max-width: 480px;
    margin: 0 auto;
    background: var(--white);
    border-radius: 20px;
    box-shadow: 0 8px 24px var(--shadow);
    padding: 28px 24px;
  }

  h1 {
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    margin: 0 0 4px;
    color: var(--accent-dark);
  }

  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #a98a92;
    margin-bottom: 24px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin: 14px 0 6px;
    color: var(--text);
  }

  input[type="text"],
  input[type="tel"] {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--lavender);
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    background: #FDFBFF;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus {
    border-color: var(--accent);
  }

  .agree-row {
    margin-top: 16px;
    padding: 10px 12px;
    background: #FFF8FA;
    border-radius: 10px;
    font-size: 12.5px;
    color: var(--text);
  }

  .radio-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .radio-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--lavender);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    background: #FDFBFF;
    transition: all 0.15s;
  }
  .radio-pill:has(input:checked) {
    border-color: var(--accent-dark);
    background: #FDF3F6;
    color: var(--accent-dark);
  }
  .radio-pill input { accent-color: var(--accent-dark); }

  .hidden-field {
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.25s ease, opacity 0.25s ease, margin 0.25s ease;
  }
  .hidden-field.show {
    max-height: 100px;
    opacity: 1;
  }

  .signature-section {
    margin-top: 22px;
  }

  .pad-wrap {
    position: relative;
    border: 2px dashed var(--accent);
    border-radius: 14px;
    background: #FFFDFE;
    overflow: hidden;
  }

  #signature-pad {
    display: block;
    width: 100%;
    height: 180px;
    touch-action: none;
    cursor: crosshair;
  }

  .pad-placeholder {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #d8b8c0;
    font-size: 13px;
    pointer-events: none;
  }

  .pad-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 8px;
  }

  .btn-clear {
    background: none;
    border: none;
    color: var(--accent-dark);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    padding: 4px 8px;
  }
  .btn-clear:hover { text-decoration: underline; }

  .submit-btn {
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: white;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 12px var(--shadow);
    transition: transform 0.15s;
  }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .status {
    text-align: center;
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }
  .status.ok { color: #6FA875; }
  .status.err { color: #D97070; }

  .hint {
    font-size: 11px;
    color: #c9a8b0;
    text-align: center;
    margin-top: 6px;
  }

  .home-fab {
    position: fixed; top: 12px; left: 12px; z-index: 5;
    width: 38px; height: 38px; border-radius: 50%;
    background: white; box-shadow: 0 4px 12px rgba(232,143,162,0.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; text-decoration: none; color: inherit; border: none; cursor: pointer;
  }
  .home-fab:active { transform: scale(0.94); }
</style>
</head>
<body>
<a href="./index.html" class="home-fab" title="메인으로">🏠</a>

<div class="card">
  <h1>🌸 참석 확인서</h1>
  <p class="subtitle">아래 정보를 입력하고 서명해주세요</p>

  <label for="name">성명</label>
  <input type="text" id="name" placeholder="이름을 입력하세요">

  <label for="phone">연락처</label>
  <input type="tel" id="phone" placeholder="010-0000-0000">

  <label>재직자 여부</label>
  <div class="radio-group" id="statusGroup">
    <label class="radio-pill"><input type="radio" name="status" value="재직자"> 재직자</label>
    <label class="radio-pill"><input type="radio" name="status" value="직업계고"> 직업계고</label>
    <label class="radio-pill"><input type="radio" name="status" value="대학생"> 대학생</label>
    <label class="radio-pill"><input type="radio" name="status" value="일반시민"> 일반 시민</label>
  </div>
  <div id="companyField" class="hidden-field">
    <label for="company">회사명</label>
    <input type="text" id="company" placeholder="재직 중인 회사명을 입력하세요">
  </div>
  <div id="schoolField" class="hidden-field">
    <label for="school">학교명</label>
    <input type="text" id="school" placeholder="재학 중인 학교명을 입력하세요">
  </div>

  <div class="agree-row">
    <input type="checkbox" id="agree" style="width:16px;height:16px;margin-right:8px;vertical-align:middle;">
    <label for="agree" style="display:inline;margin:0;font-weight:400;">개인정보 수집·이용 및 제3자 제공에 동의합니다.</label>
  </div>

  <div class="signature-section">
    <label>서명</label>
    <div class="pad-wrap">
      <canvas id="signature-pad"></canvas>
      <span class="pad-placeholder" id="pad-placeholder">여기에 서명해주세요 ✍️</span>
    </div>
    <div class="pad-actions">
      <button class="btn-clear" onclick="clearSignature()">다시 서명하기</button>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitForm()">제출하기</button>
  <div class="status" id="status"></div>
  <p class="hint">서명 이미지는 PNG로 저장되어 함께 제출됩니다</p>
</div>

<script>
  // 서명 중 글자/이미지가 선택되거나 드래그되는 것 방지
  document.addEventListener('dragstart', (e) => e.preventDefault());
  document.addEventListener('selectstart', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    e.preventDefault();
  });

  const canvas = document.getElementById('signature-pad');
  const placeholder = document.getElementById('pad-placeholder');
  let signaturePad;

  function resizeCanvas() {
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = canvas.offsetHeight * ratio;
    canvas.getContext('2d').scale(ratio, ratio);
    if (signaturePad) signaturePad.clear();
  }

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // 재직자여부 선택에 따라 회사명/학교명 필드 조건부 표시
  // (직업계고/대학생은 UI에서만 구분하고, 실제 저장되는 값은 '미래인재'로 합쳐짐)
  const isFutureTalent = (value) => value === '직업계고' || value === '대학생';
  const companyField = document.getElementById('companyField');
  const schoolField = document.getElementById('schoolField');
  document.querySelectorAll('input[name="status"]').forEach(radio => {
    radio.addEventListener('change', () => {
      if (!radio.checked) return;
      companyField.classList.toggle('show', radio.value === '재직자');
      schoolField.classList.toggle('show', isFutureTalent(radio.value));
      if (radio.value !== '재직자') document.getElementById('company').value = '';
      if (!isFutureTalent(radio.value)) document.getElementById('school').value = '';
    });
  });

  // index.html에서 저장한 날짜/장소 설정을 읽어옴 (없으면 오늘 날짜 + 전주MBC로 기본값)
  const SETTINGS_KEY = 'signform_settings';
  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }
  function loadFormSettings() {
    try {
      const raw = localStorage.getItem(SETTINGS_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { date: todayStr(), place: '전주MBC' };
  }

  signaturePad = new SignaturePad(canvas, {
    backgroundColor: 'rgba(255,255,255,0)',
    penColor: '#5A4A50',
    minWidth: 1,
    maxWidth: 3
  });

  signaturePad.addEventListener('beginStroke', () => {
    placeholder.style.display = 'none';
  });

  function clearSignature() {
    signaturePad.clear();
    placeholder.style.display = 'block';
  }

  async function submitForm() {
    const settings = loadFormSettings();
    const programId = settings.date || todayStr();
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const statusEl = document.getElementById('status');
    const btn = document.getElementById('submitBtn');

    const agree = document.getElementById('agree').checked;
    const statusRadio = document.querySelector('input[name="status"]:checked');
    const statusRaw = statusRadio ? statusRadio.value : '';
    // 직업계고/대학생은 UI 선택지일 뿐, 서명록에는 '미래인재'로 합쳐서 저장됨
    const 재직자여부 = isFutureTalent(statusRaw) ? '미래인재' : statusRaw;
    const company = document.getElementById('company').value.trim();
    const school = document.getElementById('school').value.trim();

    if (!name) {
      statusEl.textContent = '성명을 입력해주세요.';
      statusEl.className = 'status err';
      return;
    }
    if (!재직자여부) {
      statusEl.textContent = '재직자 여부를 선택해주세요.';
      statusEl.className = 'status err';
      return;
    }
    if (재직자여부 === '재직자' && !company) {
      statusEl.textContent = '회사명을 입력해주세요.';
      statusEl.className = 'status err';
      return;
    }
    if (재직자여부 === '미래인재' && !school) {
      statusEl.textContent = '학교명을 입력해주세요.';
      statusEl.className = 'status err';
      return;
    }
    if (!agree) {
      statusEl.textContent = '개인정보 수집·이용에 동의해주세요.';
      statusEl.className = 'status err';
      return;
    }
    if (signaturePad.isEmpty()) {
      statusEl.textContent = '서명을 완료해주세요.';
      statusEl.className = 'status err';
      return;
    }

    const signatureDataUrl = signaturePad.toDataURL('image/png');

    const payload = {
      programId,
      장소: settings.place || '전주MBC',
      연락처: phone,
      성명: name,
      재직자여부,
      회사명: 재직자여부 === '재직자' ? company : '',
      학교명: 재직자여부 === '미래인재' ? school : '',
      signature: signatureDataUrl,
      동의: agree
    };

    btn.disabled = true;
    statusEl.textContent = '제출 중...';
    statusEl.className = 'status';

    try {
      // ⚠️ 아래 URL을 본인 Cloudflare Worker 배포 주소로 교체하세요
      const WORKER_URL = 'https://signform.hyunra94.workers.dev/submit';

      let res;
      try {
        res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } catch (networkErr) {
        // 진짜로 서버에 연결이 안 될 때만 로컬 다운로드로 대체
        console.warn('Worker 전송 실패, 로컬 다운로드로 대체:', networkErr);
        downloadLocally(payload);
        statusEl.textContent = '서버 연결 전이라 로컬에 저장되었습니다.';
        statusEl.className = 'status ok';
        return;
      }

      const result = await res.json().catch(() => ({}));

      if (!res.ok) {
        // 서버가 응답은 했지만 거부한 경우(중복 제출 등) — 로컬 저장으로 대체하지 않고 그대로 알림
        statusEl.textContent = result.error || '제출이 거부되었습니다.';
        statusEl.className = 'status err';
        return;
      }

      statusEl.textContent = `제출 완료! (${result.sheetNumber}번째 시트, ${result.rowNumberInSheet}번째 줄) 감사합니다 🌸`;
      statusEl.className = 'status ok';
    } finally {
      btn.disabled = false;
    }
  }

  function downloadLocally(payload) {
    // 서명 이미지 다운로드
    const link = document.createElement('a');
    link.href = payload.signature;
    link.download = `signature_${payload.성명}_${Date.now()}.png`;
    link.click();

    // JSON 데이터도 함께 다운로드
    const jsonBlob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const jsonLink = document.createElement('a');
    jsonLink.href = URL.createObjectURL(jsonBlob);
    jsonLink.download = `submission_${payload.성명}_${Date.now()}.json`;
    jsonLink.click();
  }
</script>

</body>
</html>
