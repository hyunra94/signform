<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR체험버스 대기열 - 관리</title>
<link rel="icon" href="https://hyunra94.github.io/assets/favicon.png">
<meta property="og:image" content="https://hyunra94.github.io/assets/og-default.png">
<meta property="og:url" content="https://hyunra94.github.io/[레포명]/">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #FFF0F5; --bg-2: #FFE4E1;
    --accent: #F7B8C4; --accent-dark: #E88FA2;
    --lavender: #E6E0F8; --text: #5A4A50; --white: #FFFFFF;
    --shadow: rgba(232, 143, 162, 0.25);
    --full: #F0A0A8; --ok: #6FA875;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
    margin: 0; padding: 20px 14px; color: var(--text); min-height: 100vh;
  }
  .wrap { max-width: 860px; margin: 0 auto; }
  .card {
    background: var(--white); border-radius: 20px; box-shadow: 0 8px 24px var(--shadow);
    padding: 22px 20px; margin-bottom: 16px;
  }
  h1 { font-size: 19px; font-weight: 700; text-align: center; margin: 0 0 4px; color: var(--accent-dark); }
  .subtitle { text-align: center; font-size: 12.5px; color: #a98a92; margin-bottom: 4px; }
  .kiosk-link { text-align: center; margin-top: 6px; }
  .kiosk-link a { font-size: 12px; color: var(--accent-dark); }

  .conn-status {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 11.5px; color: #a98a92; margin-bottom: 4px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
  .dot.on { background: var(--ok); }
  .dot.off { background: #D97070; }

  .settings-toggle {
    display: block; margin: 10px auto 0; background: none; border: none;
    color: #c9a8b0; font-size: 12px; cursor: pointer; text-align: center;
  }
  .settings-panel { max-height: 0; overflow: hidden; opacity: 0; transition: all 0.25s ease; }
  .settings-panel.open { max-height: 320px; opacity: 1; margin-top: 14px; }
  .settings-panel .inner { background: #FDF3F6; border-radius: 14px; padding: 16px; }
  .settings-panel label { display: block; font-size: 12px; font-weight: 500; margin: 10px 0 5px; }
  .settings-panel label:first-child { margin-top: 0; }
  .settings-panel input {
    width: 100%; padding: 9px 12px; border: 1.5px solid var(--lavender); border-radius: 10px;
    font-family: inherit; font-size: 13px; background: var(--white); outline: none;
  }
  .settings-row { display: flex; gap: 10px; }
  .settings-row > div { flex: 1; }
  .settings-save {
    margin-top: 12px; width: 100%; padding: 10px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white;
    font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .settings-hint { font-size: 11px; color: #c9a8b0; margin-top: 8px; line-height: 1.5; }

  .summary { display: flex; justify-content: center; gap: 20px; margin-bottom: 14px; font-size: 12.5px; color: #a98a92; }
  .summary b { color: var(--accent-dark); font-size: 15px; }

  .slot-list { display: flex; flex-direction: column; gap: 10px; }
  .slot-row {
    border: 1.5px solid var(--lavender); border-radius: 14px; padding: 12px 14px; background: #FDFBFF;
  }
  .slot-row.current { border-color: var(--accent-dark); background: #FDF3F6; }
  .slot-row.full { border-color: var(--full); }
  .slot-head-row { display: flex; align-items: center; gap: 8px; }
  .slot-head {
    flex: 1; display: flex; align-items: center; justify-content: space-between; cursor: pointer;
  }
  .slot-del {
    background: none; border: 1px solid #F0A0A8; color: #D97070; border-radius: 8px;
    padding: 5px 9px; font-size: 11px; cursor: pointer; white-space: nowrap; font-family: inherit;
  }
  .slot-del:hover { background: #FDEDED; }
  .slot-time { font-size: 15px; font-weight: 700; }
  .slot-now-badge {
    display: inline-block; font-size: 9.5px; background: var(--accent-dark); color: white;
    border-radius: 8px; padding: 1px 6px; margin-left: 6px; vertical-align: middle;
  }
  .slot-count { font-size: 13px; color: #a98a92; }
  .slot-count b { color: var(--accent-dark); font-size: 15px; }
  .slot-count.full-text b { color: var(--full); }
  .slot-toggle { font-size: 11px; color: var(--accent-dark); }

  .entry-list { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--lavender); display: none; }
  .entry-list.open { display: block; }
  .entry-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0; font-size: 12.5px;
  }
  .entry-row + .entry-row { border-top: 1px solid #FDF3F6; }
  .entry-name { font-weight: 700; }
  .entry-meta { color: #a98a92; margin-left: 6px; font-size: 11.5px; }
  .entry-del { background: none; border: none; color: #D97070; font-size: 11px; cursor: pointer; text-decoration: underline; }
  .quick-add { margin-top: 8px; }
  .quick-add-row1 { display: flex; gap: 6px; }
  .quick-add input {
    flex: 1; min-width: 0; padding: 7px 9px; border: 1.5px solid var(--lavender); border-radius: 8px;
    font-family: inherit; font-size: 12.5px;
  }
  .quick-add-cats { display: flex; gap: 4px; margin-top: 6px; }
  .quick-cat-btn {
    flex: 1; padding: 6px 4px; border-radius: 8px; border: 1.5px solid var(--lavender);
    background: #FDFBFF; font-family: inherit; font-size: 11px; cursor: pointer;
  }
  .quick-cat-btn.active { border-color: var(--accent-dark); background: #FDF3F6; color: var(--accent-dark); }
  .quick-add-sub { margin-top: 6px; display: none; }
  .quick-add-sub.show { display: block; }
  .quick-add button.add-btn {
    width: 100%; margin-top: 6px; padding: 7px 12px; border: none; border-radius: 8px; background: var(--ok); color: white;
    font-family: inherit; font-size: 12.5px; font-weight: 700; cursor: pointer;
  }
  .quick-add button.add-btn:disabled { background: #ddd; cursor: not-allowed; }
  .empty-entries { font-size: 12px; color: #c9a8b0; padding: 4px 0; }

  .empty-msg { text-align: center; color: #c9a8b0; font-size: 13px; padding: 20px 0; }
  .reset-row { text-align: center; margin-top: 14px; }
  .reset-row button { background: none; border: none; color: #D97070; font-size: 12px; text-decoration: underline; cursor: pointer; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>🚌 VR체험버스 대기열 - 관리</h1>
    <p class="subtitle" id="dateLabel">-</p>
    <div class="conn-status"><span class="dot" id="connDot"></span><span id="connText">연결 중...</span></div>
    <div class="kiosk-link"><a href="./vr_queue_kiosk.html" target="_blank">🖥 현장용 큰 화면(키오스크) 열기 →</a></div>

    <button class="settings-toggle" onclick="toggleSettings()">⚙️ 시간대 설정</button>
    <div class="settings-panel" id="settingsPanel">
      <div class="inner">
        <div class="settings-row">
          <div><label for="startTime">시작 시간</label><input type="time" id="startTime" value="09:00"></div>
          <div><label for="endTime">종료 시간</label><input type="time" id="endTime" value="17:00"></div>
        </div>
        <div class="settings-row">
          <div><label for="intervalMinutes">회차 간격(분)</label><input type="number" id="intervalMinutes" value="20" min="5" step="5"></div>
          <div><label for="capacity">회차당 정원</label><input type="number" id="capacity" value="10" min="1"></div>
        </div>
        <div class="settings-row">
          <div><label for="lunchStart">점심시간 시작 (선택)</label><input type="time" id="lunchStart"></div>
          <div><label for="lunchEnd">점심시간 종료 (선택)</label><input type="time" id="lunchEnd"></div>
        </div>
        <button class="settings-save" onclick="applySettings()">시간대 생성 / 다시 만들기</button>
        <div class="settings-hint">⚠️ 다시 만들면 지금까지 등록된 명단이 전부 초기화돼요. 점심시간은 비워두면 종일 시간대로 생성돼요.</div>
      </div>
    </div>
  </div>

  <div class="card" id="mainCard">
    <div class="summary" id="summaryRow"></div>
    <div class="slot-list" id="slotList"></div>
    <div class="empty-msg hidden" id="emptyMsg">아직 시간대가 설정되지 않았어요. 위 "⚙️ 시간대 설정"에서 만들어주세요.</div>
    <div class="reset-row"><button onclick="resetAll()">전체 명단 초기화</button></div>
  </div>
</div>

<script>
  const WORKER_HTTP_URL = 'https://signform.hyunra94.workers.dev';
  const WS_URL_BASE = WORKER_HTTP_URL.replace(/^http/, 'ws');

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  const queueDate = todayStr();
  let ws = null;
  let currentData = { slots: [] };
  let openIndex = new Set();

  document.getElementById('dateLabel').textContent = `${queueDate} 기준`;

  function openWebSocket() {
    setConnStatus(false, '연결 중...');
    ws = new WebSocket(`${WS_URL_BASE}/queue/ws?date=${queueDate}`);
    ws.onopen = () => setConnStatus(true, '실시간 연결됨');
    ws.onclose = () => { setConnStatus(false, '재연결 중...'); setTimeout(openWebSocket, 2000); };
    ws.onerror = () => setConnStatus(false, '연결 오류');
    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === 'state') { currentData = msg.data; renderSlots(); }
    };
  }
  openWebSocket();
  setInterval(renderSlots, 30000); // '지금' 배지 갱신용

  function setConnStatus(on, text) {
    document.getElementById('connDot').className = 'dot ' + (on ? 'on' : 'off');
    document.getElementById('connText').textContent = text;
  }
  function send(payload) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(payload)); }

  function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); }

  function applySettings() {
    const startTime = document.getElementById('startTime').value || '09:00';
    const endTime = document.getElementById('endTime').value || '17:00';
    const intervalMinutes = Number(document.getElementById('intervalMinutes').value) || 20;
    const capacity = Number(document.getElementById('capacity').value) || 10;
    const lunchStart = document.getElementById('lunchStart').value || null;
    const lunchEnd = document.getElementById('lunchEnd').value || null;
    if (currentData.slots.length > 0 && !confirm('시간대를 다시 만들면 지금까지 등록된 명단이 모두 초기화돼요. 계속할까요?')) return;
    send({ type: 'configure', startTime, endTime, intervalMinutes, capacity, lunchStart, lunchEnd });
    document.getElementById('settingsPanel').classList.remove('open');
  }

  function currentSlotIndex() {
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    let best = -1;
    currentData.slots.forEach((s, i) => {
      const [h, m] = s.time.split(':').map(Number);
      if (h * 60 + m <= nowMin) best = i;
    });
    return best;
  }

  function deriveSoso(e) {
    if (e.재직자여부 === '재직자') return e.회사명 || '';
    if (e.재직자여부 === '미래인재') return e.학교명 || '';
    return '';
  }

  function renderSlots() {
    const list = document.getElementById('slotList');
    const emptyMsg = document.getElementById('emptyMsg');
    const slots = currentData.slots || [];

    if (slots.length === 0) {
      list.innerHTML = '';
      emptyMsg.classList.remove('hidden');
      document.getElementById('summaryRow').innerHTML = '';
      return;
    }
    emptyMsg.classList.add('hidden');

    const nowIdx = currentSlotIndex();
    const totalCount = slots.reduce((s, x) => s + x.entries.length, 0);
    const totalCapacity = slots.reduce((s, x) => s + x.capacity, 0);
    document.getElementById('summaryRow').innerHTML = `<span>오늘 누적 <b>${totalCount}</b>명</span><span>전체 정원 <b>${totalCapacity}</b>명</span>`;

    list.innerHTML = slots.map((s, i) => {
      const isFull = s.entries.length >= s.capacity;
      const isCurrent = i === nowIdx;
      const isOpen = openIndex.has(i);
      const entriesHtml = s.entries.length
        ? s.entries.map((e, ei) => {
            const cat = e.재직자여부 || '';
            const soso = deriveSoso(e);
            const metaText = [cat, soso].filter(Boolean).join(' · ');
            return `
            <div class="entry-row">
              <div><span class="entry-name">${escapeHtml(e.성명)}</span>${metaText ? `<span class="entry-meta">${escapeHtml(metaText)}</span>` : ''}</div>
              <button class="entry-del" onclick="removeEntry(${i}, ${ei})">삭제</button>
            </div>`;
          }).join('')
        : '<div class="empty-entries">아직 등록된 사람이 없어요.</div>';

      return `
        <div class="slot-row ${isCurrent ? 'current' : ''} ${isFull ? 'full' : ''}">
          <div class="slot-head-row">
            <div class="slot-head" onclick="toggleEntries(${i})">
              <div class="slot-time">${s.time}${isCurrent ? '<span class="slot-now-badge">지금</span>' : ''}</div>
              <div class="slot-count ${isFull ? 'full-text' : ''}"><b>${s.entries.length}</b> / ${s.capacity}명 <span class="slot-toggle">${isOpen ? '▲ 접기' : '▼ 명단보기'}</span></div>
            </div>
            <button class="slot-del" onclick="removeSlot(${i}, '${s.time}')" title="이 시간대 자체를 삭제">시간대 삭제</button>
          </div>
          <div class="entry-list ${isOpen ? 'open' : ''}" id="entries-${i}">
            ${entriesHtml}
            <div class="quick-add">
              <div class="quick-add-row1">
                <input type="text" id="qname-${i}" placeholder="이름">
              </div>
              <div class="quick-add-cats">
                <button type="button" class="quick-cat-btn" id="qcat-${i}-재직자" onclick="setQuickCat(${i},'재직자')">재직자</button>
                <button type="button" class="quick-cat-btn" id="qcat-${i}-미래인재" onclick="setQuickCat(${i},'미래인재')">미래인재</button>
                <button type="button" class="quick-cat-btn" id="qcat-${i}-일반시민" onclick="setQuickCat(${i},'일반시민')">일반시민</button>
              </div>
              <div class="quick-add-sub" id="qsub-company-${i}"><input type="text" id="qcompany-${i}" placeholder="회사명"></div>
              <div class="quick-add-sub" id="qsub-school-${i}"><input type="text" id="qschool-${i}" placeholder="학교명"></div>
              <button class="add-btn" ${isFull ? 'disabled' : ''} onclick="quickAdd(${i})">+ 추가</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  const quickCatState = {}; // { [slotIndex]: '재직자'|'미래인재'|'일반시민' }
  function setQuickCat(i, cat) {
    quickCatState[i] = cat;
    ['재직자', '미래인재', '일반시민'].forEach(c => {
      document.getElementById(`qcat-${i}-${c}`).classList.toggle('active', c === cat);
    });
    document.getElementById(`qsub-company-${i}`).classList.toggle('show', cat === '재직자');
    document.getElementById(`qsub-school-${i}`).classList.toggle('show', cat === '미래인재');
  }

  function toggleEntries(i) {
    if (openIndex.has(i)) openIndex.delete(i); else openIndex.add(i);
    renderSlots();
  }

  function quickAdd(i) {
    const name = document.getElementById(`qname-${i}`).value.trim();
    if (!name) { alert('이름을 입력해주세요.'); return; }
    const cat = quickCatState[i] || '';
    if (!cat) { alert('재직자 여부를 선택해주세요.'); return; }
    const company = cat === '재직자' ? document.getElementById(`qcompany-${i}`).value.trim() : '';
    const school = cat === '미래인재' ? document.getElementById(`qschool-${i}`).value.trim() : '';
    send({ type: 'checkin', slotIndex: i, 성명: name, 재직자여부: cat, 회사명: company, 학교명: school });
  }

  function removeSlot(index, time) {
    const slot = currentData.slots[index];
    const count = slot ? slot.entries.length : 0;
    const warn = count > 0 ? `\n(등록된 ${count}명도 같이 삭제돼요)` : '';
    if (!confirm(`${time} 시간대를 통째로 삭제할까요?${warn}`)) return;
    send({ type: 'removeSlot', slotIndex: index });
  }

  function removeEntry(slotIndex, entryIndex) {
    if (!confirm('이 사람을 명단에서 삭제할까요?')) return;
    send({ type: 'removeEntry', slotIndex, entryIndex });
  }

  function resetAll() {
    if (!confirm('오늘 등록된 명단을 전부 초기화할까요?')) return;
    send({ type: 'resetAll' });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
</script>
</body>
</html>
