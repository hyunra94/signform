<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR체험버스 대기열</title>
<link rel="icon" href="https://hyunra94.github.io/assets/favicon.png">
<meta property="og:image" content="https://hyunra94.github.io/assets/og-default.png">
<meta property="og:url" content="https://hyunra94.github.io/[레포명]/">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #FFF0F5; --bg-2: #FFE4E1;
    --accent: #F7B8C4; --accent-dark: #E88FA2;
    --lavender: #E6E0F8; --text: #5A4A50; --white: #FFFFFF;
    --shadow: rgba(232, 143, 162, 0.25);
    --full: #F0A0A8; --ok: #6FA875;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
    margin: 0; padding: 20px 14px; color: var(--text); min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  .card {
    background: var(--white); border-radius: 20px; box-shadow: 0 8px 24px var(--shadow);
    padding: 22px 20px; margin-bottom: 16px;
  }
  h1 { font-size: 19px; font-weight: 700; text-align: center; margin: 0 0 4px; color: var(--accent-dark); }
  .subtitle { text-align: center; font-size: 12.5px; color: #a98a92; margin-bottom: 4px; }

  .conn-status {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 11.5px; color: #a98a92; margin-bottom: 4px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
  .dot.on { background: var(--ok); }
  .dot.off { background: #D97070; }

  /* ---- 설정 패널 ---- */
  .settings-toggle {
    display: block; margin: 10px auto 0; background: none; border: none;
    color: #c9a8b0; font-size: 12px; cursor: pointer; text-align: center;
  }
  .settings-panel { max-height: 0; overflow: hidden; opacity: 0; transition: all 0.25s ease; }
  .settings-panel.open { max-height: 320px; opacity: 1; margin-top: 14px; }
  .settings-panel .inner { background: #FDF3F6; border-radius: 14px; padding: 16px; }
  .settings-panel label { display: block; font-size: 12px; font-weight: 500; margin: 10px 0 5px; }
  .settings-panel label:first-child { margin-top: 0; }
  .settings-panel input {
    width: 100%; padding: 9px 12px; border: 1.5px solid var(--lavender); border-radius: 10px;
    font-family: inherit; font-size: 13px; background: var(--white); outline: none;
  }
  .settings-row { display: flex; gap: 10px; }
  .settings-row > div { flex: 1; }
  .settings-save {
    margin-top: 12px; width: 100%; padding: 10px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white;
    font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .settings-hint { font-size: 11px; color: #c9a8b0; margin-top: 8px; line-height: 1.5; }

  /* ---- 슬롯 그리드 ---- */
  .slot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .slot-card {
    border: 1.5px solid var(--lavender); border-radius: 14px; padding: 12px 10px;
    text-align: center; background: #FDFBFF; transition: all 0.15s;
  }
  .slot-card.current { border-color: var(--accent-dark); background: #FDF3F6; box-shadow: 0 0 0 2px var(--accent); }
  .slot-card.full { border-color: var(--full); background: #FFF3F4; }
  .slot-time { font-size: 15px; font-weight: 700; }
  .slot-now-badge {
    display: inline-block; font-size: 9.5px; background: var(--accent-dark); color: white;
    border-radius: 8px; padding: 1px 6px; margin-left: 4px; vertical-align: middle;
  }
  .slot-count { font-size: 22px; font-weight: 700; margin: 6px 0 2px; }
  .slot-count.full-text { color: var(--full); }
  .slot-capacity { font-size: 11px; color: #a98a92; margin-bottom: 8px; }
  .slot-btns { display: flex; gap: 6px; }
  .slot-btns button {
    flex: 1; padding: 8px 0; border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .btn-plus { background: var(--ok); color: white; }
  .btn-plus:disabled { background: #ddd; cursor: not-allowed; }
  .btn-minus { background: #FDF3F6; color: var(--accent-dark); border: 1px solid var(--accent) !important; }

  .empty-msg { text-align: center; color: #c9a8b0; font-size: 13px; padding: 20px 0; }

  .summary { display: flex; justify-content: center; gap: 20px; margin-bottom: 14px; font-size: 12.5px; color: #a98a92; }
  .summary b { color: var(--accent-dark); font-size: 15px; }

  .reset-row { text-align: center; margin-top: 14px; }
  .reset-row button {
    background: none; border: none; color: #D97070; font-size: 12px;
    text-decoration: underline; cursor: pointer;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>🚌 VR체험버스 대기열</h1>
    <p class="subtitle" id="dateLabel">-</p>
    <div class="conn-status"><span class="dot" id="connDot"></span><span id="connText">연결 중...</span></div>

    <button class="settings-toggle" onclick="toggleSettings()">⚙️ 시간대 설정</button>
    <div class="settings-panel" id="settingsPanel">
      <div class="inner">
        <div class="settings-row">
          <div>
            <label for="startTime">시작 시간</label>
            <input type="time" id="startTime" value="09:00">
          </div>
          <div>
            <label for="endTime">종료 시간</label>
            <input type="time" id="endTime" value="17:00">
          </div>
        </div>
        <div class="settings-row">
          <div>
            <label for="intervalMinutes">회차 간격(분)</label>
            <input type="number" id="intervalMinutes" value="20" min="5" step="5">
          </div>
          <div>
            <label for="capacity">회차당 정원</label>
            <input type="number" id="capacity" value="8" min="1">
          </div>
        </div>
        <button class="settings-save" onclick="applySettings()">시간대 생성 / 다시 만들기</button>
        <div class="settings-hint">
          ⚠️ 다시 만들면 지금까지 체크인된 인원수가 전부 초기화돼요.<br>
          이미 만들어진 시간대의 정원만 살짝 바꾸고 싶으면 아래 슬롯 카드에서 직접 조정하세요.
        </div>
      </div>
    </div>
  </div>

  <div class="card" id="mainCard">
    <div class="summary" id="summaryRow"></div>
    <div class="slot-grid" id="slotGrid"></div>
    <div class="empty-msg hidden" id="emptyMsg">아직 시간대가 설정되지 않았어요. 위 "⚙️ 시간대 설정"에서 만들어주세요.</div>
    <div class="reset-row"><button onclick="resetAll()">전체 인원 초기화</button></div>
  </div>
</div>

<script>
  // ⚠️ 배포된 Worker 주소로 교체하세요
  const WORKER_HTTP_URL = 'https://signform.hyunra94.workers.dev';
  const WS_URL_BASE = WORKER_HTTP_URL.replace(/^http/, 'ws');

  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  const queueDate = todayStr();
  let ws = null;
  let currentData = { slots: [] };

  document.getElementById('dateLabel').textContent = `${queueDate} 기준`;

  function openWebSocket() {
    setConnStatus(false, '연결 중...');
    ws = new WebSocket(`${WS_URL_BASE}/queue/ws?date=${queueDate}`);
    ws.onopen = () => setConnStatus(true, '실시간 연결됨');
    ws.onclose = () => { setConnStatus(false, '재연결 중...'); setTimeout(openWebSocket, 2000); };
    ws.onerror = () => setConnStatus(false, '연결 오류');
    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === 'state') {
        currentData = msg.data;
        renderSlots();
      }
    };
  }
  openWebSocket();

  function setConnStatus(on, text) {
    document.getElementById('connDot').className = 'dot ' + (on ? 'on' : 'off');
    document.getElementById('connText').textContent = text;
  }

  function send(payload) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(payload));
  }

  function toggleSettings() {
    document.getElementById('settingsPanel').classList.toggle('open');
  }

  function applySettings() {
    const startTime = document.getElementById('startTime').value || '09:00';
    const endTime = document.getElementById('endTime').value || '17:00';
    const intervalMinutes = Number(document.getElementById('intervalMinutes').value) || 20;
    const capacity = Number(document.getElementById('capacity').value) || 8;

    if (currentData.slots.length > 0 &&
        !confirm('시간대를 다시 만들면 지금까지 체크인된 인원수가 모두 초기화돼요. 계속할까요?')) {
      return;
    }
    send({ type: 'configure', startTime, endTime, intervalMinutes, capacity });
    document.getElementById('settingsPanel').classList.remove('open');
  }

  function currentSlotIndex() {
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    let best = -1;
    currentData.slots.forEach((s, i) => {
      const [h, m] = s.time.split(':').map(Number);
      const slotMin = h * 60 + m;
      if (slotMin <= nowMin) best = i;
    });
    return best;
  }

  function renderSlots() {
    const grid = document.getElementById('slotGrid');
    const emptyMsg = document.getElementById('emptyMsg');
    const slots = currentData.slots || [];

    if (slots.length === 0) {
      grid.innerHTML = '';
      emptyMsg.classList.remove('hidden');
      document.getElementById('summaryRow').innerHTML = '';
      return;
    }
    emptyMsg.classList.add('hidden');

    const nowIdx = currentSlotIndex();
    const totalCount = slots.reduce((s, x) => s + x.count, 0);
    const totalCapacity = slots.reduce((s, x) => s + x.capacity, 0);
    document.getElementById('summaryRow').innerHTML = `
      <span>오늘 누적 <b>${totalCount}</b>명</span>
      <span>전체 정원 <b>${totalCapacity}</b>명</span>
    `;

    grid.innerHTML = slots.map((s, i) => {
      const isFull = s.count >= s.capacity;
      const isCurrent = i === nowIdx;
      return `
        <div class="slot-card ${isCurrent ? 'current' : ''} ${isFull ? 'full' : ''}">
          <div class="slot-time">${s.time}${isCurrent ? '<span class="slot-now-badge">지금</span>' : ''}</div>
          <div class="slot-count ${isFull ? 'full-text' : ''}">${s.count}<span style="font-size:13px;color:#c9a8b0;"> / ${s.capacity}</span></div>
          <div class="slot-btns">
            <button class="btn-minus" onclick="decSlot(${i})">−1</button>
            <button class="btn-plus" ${isFull ? 'disabled' : ''} onclick="incSlot(${i})">+1</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function incSlot(i) { send({ type: 'increment', slotIndex: i }); }
  function decSlot(i) { send({ type: 'decrement', slotIndex: i }); }

  function resetAll() {
    if (!confirm('오늘 체크인된 인원을 전부 0으로 초기화할까요?')) return;
    send({ type: 'resetAll' });
  }
</script>
</body>
</html>
