<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서명록 - 실시간 접수 현황</title>
<link rel="icon" href="https://hyunra94.github.io/assets/favicon.png">
<meta property="og:image" content="https://hyunra94.github.io/assets/og-default.png">
<meta property="og:url" content="https://hyunra94.github.io/[레포명]/">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #FFF0F5; --bg-2: #FFE4E1;
    --accent: #F7B8C4; --accent-dark: #E88FA2;
    --lavender: #E6E0F8; --text: #5A4A50; --white: #FFFFFF;
    --shadow: rgba(232, 143, 162, 0.25); --ok: #6FA875;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
    margin: 0; padding: 20px 14px; color: var(--text); min-height: 100vh;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  .card {
    background: var(--white); border-radius: 20px; box-shadow: 0 8px 24px var(--shadow);
    padding: 22px 20px; margin-bottom: 16px;
  }
  h1 { font-size: 18px; font-weight: 700; text-align: center; margin: 0 0 4px; color: var(--accent-dark); }
  .subtitle { text-align: center; font-size: 12.5px; color: #a98a92; margin-bottom: 4px; }

  .key-row { display: flex; gap: 8px; }
  .key-row input {
    flex: 1; min-width: 0; padding: 12px 14px; border: 1.5px solid var(--lavender); border-radius: 12px;
    font-family: inherit; font-size: 14px; background: #FDFBFF; outline: none;
  }
  .key-row button {
    padding: 12px 18px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: white; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .remember-row { display: flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 12px; color: #a98a92; }
  .status { text-align: center; font-size: 13px; margin-top: 10px; min-height: 18px; }
  .status.err { color: #D97070; }

  .type-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .type-tab {
    flex: 1; padding: 9px; border-radius: 10px; border: 1.5px solid var(--lavender);
    background: #FDFBFF; font-family: inherit; font-size: 12.5px; font-weight: 700; cursor: pointer;
  }
  .type-tab.active { border-color: var(--accent-dark); background: #FDF3F6; color: var(--accent-dark); }

  .summary-row {
    display: flex; justify-content: center; gap: 20px; margin-bottom: 14px; font-size: 12.5px; color: #a98a92;
  }
  .summary-row b { color: var(--accent-dark); font-size: 20px; }

  .filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center; }
  .filter-tab {
    padding: 6px 12px; border-radius: 16px; border: 1.5px solid var(--lavender);
    background: #FDFBFF; color: var(--text); font-family: inherit; font-size: 11.5px;
    font-weight: 700; cursor: pointer;
  }
  .filter-tab.active { border-color: var(--accent-dark); background: #FDF3F6; color: var(--accent-dark); }

  .conn-row { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 11px; color: #a98a92; margin-bottom: 10px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
  .dot.on { background: var(--ok); }

  .live-list { display: flex; flex-direction: column-reverse; gap: 8px; max-height: 60vh; overflow-y: auto; }
  .live-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; border-radius: 12px; background: #FDFBFF; border: 1px solid var(--lavender);
    font-size: 13px; animation: fadein 0.3s ease;
  }
  .live-row.new { border-color: var(--ok); background: #F0FAF2; }
  .live-row .name { font-weight: 700; }
  .live-row .badge {
    font-size: 10px; background: #FDF3F6; color: var(--accent-dark); border-radius: 8px; padding: 1px 6px; margin-left: 6px;
  }
  .live-row .time { font-size: 11px; color: #b89aa2; }
  .live-row .phone { font-size: 11px; color: #a98a92; margin-left: 8px; }
  @keyframes fadein { from { opacity: 0; transform: translateY(-6px);} to { opacity: 1; transform: translateY(0);} }

  .empty-msg { text-align: center; color: #c9a8b0; font-size: 13px; padding: 30px 0; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>📋 서명록 - 실시간 접수 현황</h1>
    <p class="subtitle" id="dateLabel">-</p>

    <div id="loginArea">
      <div class="key-row">
        <input type="password" id="adminKey" placeholder="관리자 키 입력">
        <button onclick="start()">확인</button>
      </div>
      <div class="remember-row">
        <input type="checkbox" id="rememberKey" style="width:14px;height:14px;">
        <label for="rememberKey">이 브라우저에 기억하기</label>
      </div>
      <div class="status" id="loginStatus"></div>
    </div>

    <div id="viewArea" class="hidden">
      <div class="type-tabs">
        <button class="type-tab active" id="tabSignature" onclick="switchType('signature')">📝 세미나 서명록</button>
        <button class="type-tab" id="tabVr" onclick="switchType('vr')">🚌 VR체험버스</button>
      </div>
      <div class="conn-row"><span class="dot" id="connDot"></span><span id="connText">불러오는 중...</span></div>
      <div class="summary-row" id="summaryRow"></div>
      <div class="filter-row" id="filterRow">
        <button class="filter-tab active" data-cat="" onclick="setFilter('')">전체</button>
        <button class="filter-tab" data-cat="재직자" onclick="setFilter('재직자')">재직자</button>
        <button class="filter-tab" data-cat="미래인재" onclick="setFilter('미래인재')">미래인재</button>
        <button class="filter-tab" data-cat="일반시민" onclick="setFilter('일반시민')">일반시민</button>
      </div>
      <div class="live-list" id="liveList"></div>
      <div class="empty-msg hidden" id="emptyMsg">아직 접수된 사람이 없어요.</div>
    </div>
  </div>
</div>

<script>
  // ⚠️ 배포된 Worker 주소로 교체하세요
  const WORKER_HTTP_URL = 'https://signform.hyunra94.workers.dev';
  const POLL_INTERVAL_MS = 4000;

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  let adminKey = '';
  let currentType = 'signature'; // 'signature' | 'vr'
  let lastKnownCount = 0;
  let pollTimer = null;

  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('admin_key');
    if (saved) {
      document.getElementById('adminKey').value = saved;
      document.getElementById('rememberKey').checked = true;
      start();
    }
  });

  function start() {
    const key = document.getElementById('adminKey').value.trim();
    const statusEl = document.getElementById('loginStatus');
    if (!key) { statusEl.textContent = '관리자 키를 입력해주세요.'; statusEl.className = 'status err'; return; }
    adminKey = key;

    if (document.getElementById('rememberKey').checked) localStorage.setItem('admin_key', key);
    else localStorage.removeItem('admin_key');

    document.getElementById('loginArea').classList.add('hidden');
    document.getElementById('viewArea').classList.remove('hidden');
    document.getElementById('dateLabel').textContent = `${todayStr()} 기준`;

    fetchAndRender(true);
    pollTimer = setInterval(() => fetchAndRender(false), POLL_INTERVAL_MS);
  }

  function switchType(type) {
    currentType = type;
    document.getElementById('tabSignature').classList.toggle('active', type === 'signature');
    document.getElementById('tabVr').classList.toggle('active', type === 'vr');
    lastKnownCount = 0;
    filterCat = '';
    document.querySelectorAll('.filter-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.cat === ''));
    document.getElementById('liveList').innerHTML = '';
    fetchAndRender(true);
  }

  function currentProgramId() {
    const base = todayStr();
    return currentType === 'vr' ? `${base}-vr` : base;
  }

  async function fetchAndRender(isFirstLoad) {
    const programId = currentProgramId();
    try {
      const res = await fetch(`${WORKER_HTTP_URL}/admin/rows?programId=${encodeURIComponent(programId)}&key=${encodeURIComponent(adminKey)}`);
      if (res.status === 401) {
        setConn(false, '관리자 키가 올바르지 않아요');
        clearInterval(pollTimer);
        return;
      }
      if (!res.ok) { setConn(false, '불러오기 실패'); return; }
      const data = await res.json();
      setConn(true, '실시간 연결됨');
      renderList(data.items || [], isFirstLoad);
    } catch (err) {
      setConn(false, '연결 오류');
    }
  }

  function setConn(on, text) {
    document.getElementById('connDot').classList.toggle('on', on);
    document.getElementById('connText').textContent = text;
  }

  function formatTime5(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
  }

  let filterCat = '';
  function setFilter(cat) {
    filterCat = cat;
    document.querySelectorAll('.filter-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.cat === cat);
    });
    renderList(lastItems, false);
  }

  let lastItems = [];

  function renderList(items, isFirstLoad) {
    lastItems = items;
    const list = document.getElementById('liveList');
    const emptyMsg = document.getElementById('emptyMsg');
    const agreedCount = items.filter(it => it.동의).length;

    document.getElementById('summaryRow').innerHTML =
      `<span>총 <b>${items.length}</b>명</span><span>동의 <b>${agreedCount}</b>명</span>`;

    const filtered = filterCat ? items.filter(it => it.재직자여부 === filterCat) : items;

    if (filtered.length === 0) {
      list.innerHTML = '';
      emptyMsg.classList.remove('hidden');
      emptyMsg.textContent = filterCat ? `'${filterCat}' 항목이 없어요.` : '아직 접수된 사람이 없어요.';
      lastKnownCount = items.length;
      return;
    }
    emptyMsg.classList.add('hidden');

    const isNewBatch = !isFirstLoad && items.length > lastKnownCount;
    list.innerHTML = filtered.map((it) => {
      const time = formatTime5(it.submittedAt);
      const isNew = isNewBatch && it.index >= lastKnownCount;
      const badge = it.재직자여부 ? `<span class="badge">${it.재직자여부}</span>` : '';
      const phone = it.연락처 ? `<span class="phone">${escapeHtml(it.연락처)}</span>` : '';
      return `
        <div class="live-row ${isNew ? 'new' : ''}">
          <div><span class="name">${it.index + 1}. ${escapeHtml(it.성명 || '')}</span>${badge}${phone}</div>
          <div class="time">${time}</div>
        </div>
      `;
    }).join('');
    lastKnownCount = items.length;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
</script>
</body>
</html>
