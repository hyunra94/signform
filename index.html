<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>참석 확인서 - 시작하기</title>
<link rel="icon" href="https://hyunra94.github.io/assets/favicon.png">
<meta property="og:image" content="https://hyunra94.github.io/assets/og-default.png">
<meta property="og:url" content="https://hyunra94.github.io/[레포명]/">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #FFF0F5; --bg-2: #FFE4E1;
    --accent: #F7B8C4; --accent-dark: #E88FA2;
    --lavender: #E6E0F8; --text: #5A4A50; --white: #FFFFFF;
    --shadow: rgba(232, 143, 162, 0.25);
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
    margin: 0; padding: 24px 16px; color: var(--text); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    max-width: 460px; width: 100%; background: var(--white);
    border-radius: 20px; box-shadow: 0 8px 24px var(--shadow); padding: 32px 24px;
  }
  h1 { font-size: 20px; font-weight: 700; text-align: center; margin: 0 0 6px; color: var(--accent-dark); }
  .subtitle { text-align: center; font-size: 13px; color: #a98a92; margin-bottom: 28px; }

  .settings-toggle {
    display: block; margin: 0 auto 18px; background: none; border: none;
    color: #c9a8b0; font-size: 12px; cursor: pointer; text-align: center;
  }
  .settings-toggle:hover { color: var(--accent-dark); }

  .settings-panel {
    max-height: 0; overflow: hidden; opacity: 0;
    transition: max-height 0.25s ease, opacity 0.25s ease, margin 0.25s ease;
  }
  .settings-panel.open { max-height: 220px; opacity: 1; margin-bottom: 18px; }
  .settings-panel .inner {
    background: #FDF3F6; border-radius: 14px; padding: 16px;
  }
  .settings-panel label {
    display: block; font-size: 12px; font-weight: 500; margin: 10px 0 5px; color: var(--text);
  }
  .settings-panel label:first-child { margin-top: 0; }
  .settings-panel input {
    width: 100%; padding: 9px 12px; border: 1.5px solid var(--lavender); border-radius: 10px;
    font-family: inherit; font-size: 13px; background: var(--white); outline: none;
  }
  .settings-panel input:focus { border-color: var(--accent); }
  .settings-save {
    margin-top: 12px; width: 100%; padding: 10px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white;
    font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .settings-saved-msg {
    text-align: center; font-size: 11.5px; color: #6FA875; margin-top: 8px; min-height: 14px;
  }

  .option-list { display: flex; flex-direction: column; gap: 12px; }
  .option {
    display: flex; align-items: center; gap: 14px; padding: 16px 18px;
    border-radius: 16px; border: 1.5px solid var(--lavender); background: #FDFBFF;
    text-decoration: none; color: var(--text); transition: all 0.15s;
  }
  .option:hover { border-color: var(--accent); background: #FDF3F6; transform: translateY(-1px); }
  .option .emoji { font-size: 26px; flex-shrink: 0; }
  .option .info { flex: 1; }
  .option .title { font-size: 14.5px; font-weight: 700; margin-bottom: 2px; }
  .option .desc { font-size: 12px; color: #a98a92; line-height: 1.4; }
  .option .arrow { color: var(--accent-dark); font-size: 18px; }

  .divider { display: flex; align-items: center; gap: 10px; margin: 22px 0 14px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--lavender); }
  .divider span { font-size: 11px; color: #c9a8b0; }

  .hint {
    font-size: 11.5px; color: #c9a8b0; text-align: center; margin-top: 20px; line-height: 1.6;
  }
</style>
</head>
<body>

<div class="card">
  <h1>🌸 참석 확인서</h1>
  <p class="subtitle">상황에 맞는 방식을 선택해주세요</p>

  <button class="settings-toggle" onclick="toggleSettings()">⚙️ 오늘 행사 날짜/장소 설정 <span id="settingsCurrent"></span></button>
  <div class="settings-panel" id="settingsPanel">
    <div class="inner">
      <label for="settingDate">날짜</label>
      <input type="date" id="settingDate">

      <label for="settingPlace">장소</label>
      <input type="text" id="settingPlace" placeholder="예: 전주MBC">

      <button class="settings-save" onclick="saveSettings()">저장</button>
      <div class="settings-saved-msg" id="settingsSavedMsg"></div>
    </div>
  </div>

  <div class="option-list">
    <a class="option" href="./signature_form.html">
      <span class="emoji">📝</span>
      <div class="info">
        <div class="title">한 기기로 작성</div>
        <div class="desc">태블릿 한 대에서 입력부터 서명까지 혼자 진행</div>
      </div>
      <span class="arrow">›</span>
    </a>

    <div class="divider"><span>두 기기 동시 사용</span></div>

    <a class="option" href="./signature_form_live.html">
      <span class="emoji">💻</span>
      <div class="info">
        <div class="title">PC용 - 세션 시작</div>
        <div class="desc">여기서 정보를 입력하고, 코드를 태블릿에 알려주세요</div>
      </div>
      <span class="arrow">›</span>
    </a>

    <a class="option" href="./signature_pad_tablet.html">
      <span class="emoji">✍️</span>
      <div class="info">
        <div class="title">태블릿용 - 서명 전용</div>
        <div class="desc">PC에서 받은 코드를 입력하고 서명만 크게</div>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>

  <p class="hint">
    두 기기를 같이 쓰실 땐 PC에서 먼저 세션을 시작한 뒤,<br>
    화면에 뜨는 4자리 코드를 태블릿에 입력해주세요.
  </p>
</div>

<script>
  // 모든 폼(signature_form.html / _live.html / _tablet.html)이 공통으로 읽는 설정값
  // key: 'signform_settings' = { date: 'YYYY-MM-DD', place: '전주MBC' }
  const SETTINGS_KEY = 'signform_settings';

  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function loadSettings() {
    try {
      const raw = localStorage.getItem(SETTINGS_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { date: todayStr(), place: '전주MBC' };
  }

  function toggleSettings() {
    const panel = document.getElementById('settingsPanel');
    const isOpen = panel.classList.toggle('open');
    if (isOpen) {
      const s = loadSettings();
      document.getElementById('settingDate').value = s.date || todayStr();
      document.getElementById('settingPlace').value = s.place || '전주MBC';
    }
  }

  function saveSettings() {
    const date = document.getElementById('settingDate').value || todayStr();
    const place = document.getElementById('settingPlace').value.trim() || '전주MBC';
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({ date, place }));
    updateSettingsLabel();
    const msg = document.getElementById('settingsSavedMsg');
    msg.textContent = '저장됐어요 ✓';
    setTimeout(() => { msg.textContent = ''; }, 2000);
  }

  function updateSettingsLabel() {
    const s = loadSettings();
    document.getElementById('settingsCurrent').textContent = `(${s.date} · ${s.place})`;
  }

  updateSettingsLabel();
</script>
</body>
</html>
