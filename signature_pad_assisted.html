<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>참석자 입력 (담당자 보조)</title>
<link rel="icon" href="https://hyunra94.github.io/assets/favicon.png">
<meta property="og:image" content="https://hyunra94.github.io/assets/og-default.png">
<meta property="og:url" content="https://hyunra94.github.io/[레포명]/">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.1.7/signature_pad.umd.min.js"></script>
<style>
  :root {
    --bg-1: #FFF0F5; --bg-2: #FFE4E1;
    --accent: #F7B8C4; --accent-dark: #E88FA2;
    --lavender: #E6E0F8; --text: #5A4A50; --white: #FFFFFF;
    --shadow: rgba(232, 143, 162, 0.25);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; margin: 0; font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2)); color: var(--text);
    overscroll-behavior: none;
    -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  input, textarea {
    -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text;
  }

  /* ---- 세션 선택 화면 ---- */
  .session-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; padding: 24px; gap: 16px;
  }
  .session-screen h1 { font-size: 22px; color: var(--accent-dark); margin: 0 0 8px; }
  .join-row { display: flex; gap: 10px; width: 100%; max-width: 320px; }
  .join-row input {
    flex: 1; min-width: 0; padding: clamp(12px, 4vw, 18px); border-radius: 14px; border: 2px solid var(--lavender);
    font-family: inherit; font-size: clamp(20px, 8vw, 26px); text-align: center;
    letter-spacing: clamp(3px, 3vw, 8px);
  }
  .join-btn {
    padding: 18px 22px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: white; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer;
  }
  .kb-toggle-btn {
    padding: 18px 16px; border: 1.5px solid var(--lavender); border-radius: 14px;
    background: #FDFBFF; font-size: 18px; cursor: pointer;
  }
  .kb-hint {
    font-size: 11.5px; color: #a98a92; text-align: center; margin-top: 10px;
    max-width: 320px; line-height: 1.5;
  }

  /* ---- 입력 화면 (풀스크린) ---- */
  .sign-screen { display: none; flex-direction: column; height: 100%; padding: 16px; overflow-y: auto; }
  .sign-screen.active { display: flex; }

  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 6px 12px;
  }
  .who { font-size: 15px; font-weight: 700; color: var(--text); }
  .who .placeholder-name { color: #c9a8b0; font-weight: 400; }
  .conn-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #a98a92; }
  .btn-plain {
    background: none; border: none; color: var(--accent-dark); font-size: 11px;
    text-decoration: underline; cursor: pointer; padding: 0; margin-left: 2px; font-family: inherit;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
  .dot.on { background: #6FA875; }
  .dot.off { background: #D97070; }

  .section-label {
    font-size: 12.5px; font-weight: 700; color: var(--accent-dark); margin: 6px 0 8px;
  }

  /* ---- 연락처 ---- */
  .phone-section { margin-bottom: 14px; }
  .phone-display-btn {
    width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 16px 18px; border-radius: 14px; border: 2px dashed var(--accent);
    background: #FDFBFF; font-family: inherit; cursor: pointer;
  }
  .phone-display-btn .val { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; }
  .phone-display-btn .val.empty { color: #c9a8b0; font-weight: 400; }
  .phone-display-btn .icon { font-size: 20px; flex-shrink: 0; }

  /* ---- 소속 구분 ---- */
  .cat-section {
    overflow: hidden; max-height: 0; opacity: 0; margin-bottom: 0;
    transition: max-height 0.3s ease, opacity 0.3s ease, margin 0.3s ease;
  }
  .cat-section.show { max-height: 260px; opacity: 1; margin-bottom: 14px; }
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .cat-btn {
    padding: 16px 8px; border-radius: 14px; border: 2px solid var(--lavender);
    background: #FDFBFF; color: var(--text); font-family: inherit; font-size: 15px; font-weight: 700;
    cursor: pointer;
  }
  .cat-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); border-color: var(--accent-dark); color: white; }

  .sub-field {
    overflow: hidden; max-height: 0; opacity: 0;
    transition: max-height 0.25s ease, opacity 0.25s ease, margin 0.25s ease;
  }
  .sub-field.show { max-height: 90px; opacity: 1; margin-top: 10px; }
  .sub-field input {
    width: 100%; padding: 14px 16px; border-radius: 12px; border: 1.5px solid var(--lavender);
    font-family: inherit; font-size: 15px; background: var(--white); outline: none;
  }
  .sub-field input:focus { border-color: var(--accent); }
  .sub-field .hint { font-size: 11px; color: #a98a92; margin-top: 4px; }

  /* ---- 서명 ---- */
  .pad-wrap {
    flex: 1; min-height: 200px; position: relative; border: 3px dashed var(--accent); border-radius: 20px;
    background: var(--white); overflow: hidden; box-shadow: 0 8px 24px var(--shadow);
  }
  #signature-pad { display: block; width: 100%; height: 100%; touch-action: none; }
  .pad-placeholder {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #d8b8c0; font-size: 20px; pointer-events: none; text-align: center; padding: 0 20px;
  }
  .saved-badge {
    position: absolute; top: 14px; right: 14px; background: #F0FAF2; color: #4a7d52;
    padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
    display: none; align-items: center; gap: 4px;
  }

  .bottom-bar { display: flex; gap: 10px; margin-top: 14px; }
  .bottom-bar button {
    flex: 1; padding: 15px; border-radius: 16px; border: none; font-family: inherit;
    font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .btn-clear { background: #FDF3F6; color: var(--accent-dark); border: 2px solid var(--accent) !important; }

  .wait-note {
    text-align: center; font-size: 12px; color: #a98a92; margin-top: 10px; line-height: 1.5;
  }
  .status { text-align: center; font-size: 13px; margin-top: 8px; min-height: 18px; }
  .status.ok { color: #6FA875; }
  .status.err { color: #D97070; }

  .hidden { display: none !important; }

  .home-fab {
    position: fixed; top: 12px; left: 12px; z-index: 5;
    width: 38px; height: 38px; border-radius: 50%;
    background: white; box-shadow: 0 4px 12px rgba(232,143,162,0.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; text-decoration: none; color: inherit; border: none; cursor: pointer;
  }
  .home-fab:active { transform: scale(0.94); }

  /* ---- 연락처 숫자패드 팝업 ---- */
  .numpad-modal-backdrop {
    position: fixed; inset: 0; background: rgba(90, 74, 80, 0.5);
    display: none; align-items: center; justify-content: center; padding: 20px; z-index: 25;
  }
  .numpad-modal-backdrop.open { display: flex; }
  .numpad-modal-card {
    background: var(--white); border-radius: 22px; padding: 20px; width: 100%; max-width: 340px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  }
  .numpad-modal-head {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 15px; font-weight: 700; color: var(--accent-dark); margin-bottom: 10px;
  }
  .numpad-modal-close { background: none; border: none; font-size: 20px; color: var(--text); cursor: pointer; line-height: 1; }
  .numpad-preview {
    text-align: center; font-size: 24px; font-weight: 700; letter-spacing: 1px; color: var(--text);
    background: #FDF3F6; border-radius: 12px; padding: 14px; margin-bottom: 14px; min-height: 30px;
  }
  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .numpad-key {
    padding: 18px 0; border-radius: 12px; border: 1.5px solid var(--lavender);
    background: #FDFBFF; color: var(--text); font-family: inherit; font-size: 20px;
    font-weight: 700; cursor: pointer; -webkit-user-select: none; user-select: none;
  }
  .numpad-key:active { background: #FDF3F6; border-color: var(--accent); }
  .numpad-del { color: var(--accent-dark); }
  .numpad-done-btn {
    width: 100%; margin-top: 12px; padding: 14px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white;
    font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer;
  }
</style>
</head>
<body>
<a href="./index.html" class="home-fab" title="메인으로">🏠</a>

<!-- 연락처 숫자패드 팝업 -->
<div class="numpad-modal-backdrop" id="numpadModalBackdrop" onclick="if(event.target===this) closePhoneNumpad()">
  <div class="numpad-modal-card">
    <div class="numpad-modal-head">
      <span>연락처를 입력해주세요</span>
      <button type="button" class="numpad-modal-close" onclick="closePhoneNumpad()">✕</button>
    </div>
    <div class="numpad-preview" id="numpadPreview">010-0000-0000</div>
    <div class="numpad" id="phoneNumpad">
      <button type="button" class="numpad-key" data-key="1">1</button>
      <button type="button" class="numpad-key" data-key="2">2</button>
      <button type="button" class="numpad-key" data-key="3">3</button>
      <button type="button" class="numpad-key" data-key="4">4</button>
      <button type="button" class="numpad-key" data-key="5">5</button>
      <button type="button" class="numpad-key" data-key="6">6</button>
      <button type="button" class="numpad-key" data-key="7">7</button>
      <button type="button" class="numpad-key" data-key="8">8</button>
      <button type="button" class="numpad-key" data-key="9">9</button>
      <button type="button" class="numpad-key" data-key="-">－</button>
      <button type="button" class="numpad-key" data-key="0">0</button>
      <button type="button" class="numpad-key numpad-del" data-key="del">⌫</button>
    </div>
    <button type="button" class="numpad-done-btn" onclick="closePhoneNumpad()">완료</button>
  </div>
</div>

<!-- 세션 참가 화면 -->
<div class="session-screen" id="sessionScreen">
  <h1>🌸 참가 코드 입력</h1>
  <div class="join-row">
    <input type="text" id="joinCodeInput" placeholder="0000" maxlength="4" inputmode="none">
    <button class="kb-toggle-btn" onclick="showKeyboard()" title="화면 키보드 띄우기">⌨️</button>
    <button class="join-btn" onclick="joinSession()">참가</button>
  </div>
  <p class="kb-hint">담당자 화면에 뜬 4자리 코드를 입력하거나, QR코드를 스캔하면 자동으로 참가돼요.</p>
</div>

<!-- 입력 화면 -->
<div class="sign-screen" id="signScreen">
  <div class="top-bar">
    <div class="who">
      <span id="whoName" class="placeholder-name">이름 입력 대기중...</span>
    </div>
    <div class="conn-status">
      <span class="dot" id="connDot"></span><span id="connText">연결 중</span>
      <button class="btn-plain" onclick="resetSession()">코드 변경</button>
    </div>
  </div>

  <div class="phone-section">
    <div class="section-label">📱 연락처</div>
    <button type="button" class="phone-display-btn" id="phoneDisplayBtn" onclick="openPhoneNumpad()">
      <span class="val empty" id="phoneVal">숫자 키패드로 입력하기</span>
      <span class="icon">🔢</span>
    </button>
  </div>

  <div class="cat-section" id="catSection">
    <div class="section-label">🙋 소속을 골라주세요</div>
    <div class="cat-grid">
      <button type="button" class="cat-btn" id="catBtn-재직자" onclick="selectCat('재직자')">재직자</button>
      <button type="button" class="cat-btn" id="catBtn-직업계고" onclick="selectCat('직업계고')">직업계고</button>
      <button type="button" class="cat-btn" id="catBtn-대학생" onclick="selectCat('대학생')">대학생</button>
      <button type="button" class="cat-btn" id="catBtn-일반시민" onclick="selectCat('일반시민')">일반 시민</button>
    </div>
  </div>

  <div class="pad-wrap">
    <canvas id="signature-pad"></canvas>
    <span class="pad-placeholder" id="pad-placeholder">여기에 크게 서명해주세요 ✍️</span>
    <div class="saved-badge" id="savedBadge">✓ 저장됨</div>
  </div>

  <div class="bottom-bar">
    <button class="btn-clear" onclick="clearSignature()">다시 서명</button>
  </div>
  <p class="wait-note">서명까지 마치면 담당자가 확인 후 제출해드려요. 따로 제출 버튼을 누르지 않아도 돼요.</p>
  <div class="status" id="status"></div>
</div>

<script>
  // ⚠️ 배포된 Worker 주소로 교체하세요
  const WORKER_HTTP_URL = 'https://signform.hyunra94.workers.dev';
  const WS_URL_BASE = WORKER_HTTP_URL.replace(/^http/, 'ws');
  // programId는 담당자(PC) 쪽에서 세션 시작 시 자동으로 세팅되어 동기화됨

  // 서명 중 글자/이미지가 선택되거나 드래그되는 것 방지
  document.addEventListener('dragstart', (e) => e.preventDefault());
  document.addEventListener('selectstart', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    e.preventDefault();
  });

  let ws = null;
  let sessionCode = null;
  let intentionalDisconnect = false;
  let remoteState = { 성명: '', 연락처: '', 재직자여부: '', signature: '', 동의: false };
  let selectedCatButton = ''; // 이 기기에서 직접 고른 버튼(재직자/직업계고/대학생/일반시민) — 하이라이트 표시용

  const canvas = document.getElementById('signature-pad');
  const placeholder = document.getElementById('pad-placeholder');
  const savedBadge = document.getElementById('savedBadge');
  let signaturePad;
  let saveTimer = null;

  function resizeCanvas() {
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    const saved = signaturePad ? signaturePad.toData() : null;
    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = canvas.offsetHeight * ratio;
    canvas.getContext('2d').scale(ratio, ratio);
    if (signaturePad) {
      signaturePad.clear();
      if (saved && saved.length) signaturePad.fromData(saved);
    }
  }
  window.addEventListener('resize', resizeCanvas);

  let liveStreamTimer = null;
  let lastLiveSnapshot = '';

  function startLiveStream() {
    stopLiveStream();
    liveStreamTimer = setInterval(sendLiveSnapshot, 80);
  }
  function stopLiveStream() {
    if (liveStreamTimer) { clearInterval(liveStreamTimer); liveStreamTimer = null; }
  }
  function sendLiveSnapshot() {
    const data = signaturePad.toData();
    if (!data || !data.length) return;
    const w = canvas.offsetWidth || 1;
    const h = canvas.offsetHeight || 1;
    const strokes = data.map(group => group.points.map(p => [
      +(p.x / w).toFixed(4), +(p.y / h).toFixed(4)
    ]));
    const snapshot = JSON.stringify(strokes);
    if (snapshot === lastLiveSnapshot) return;
    lastLiveSnapshot = snapshot;
    send({ type: 'strokeLive', points: strokes, phase: 'drawing' });
  }

  function initSignaturePad() {
    resizeCanvas();
    signaturePad = new SignaturePad(canvas, {
      backgroundColor: 'rgba(255,255,255,0)',
      penColor: '#5A4A50', minWidth: 1.5, maxWidth: 4
    });
    signaturePad.addEventListener('beginStroke', () => {
      placeholder.style.display = 'none';
      savedBadge.style.display = 'none';
      startLiveStream();
    });
    signaturePad.addEventListener('endStroke', () => {
      sendLiveSnapshot();
      stopLiveStream();
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        const dataUrl = signaturePad.toDataURL('image/png');
        send({ type: 'signature', dataUrl });
        send({ type: 'strokeLive', points: [], phase: 'done' });
        savedBadge.style.display = 'flex';
      }, 300);
    });
  }

  function clearSignature() {
    signaturePad.clear();
    placeholder.style.display = 'block';
    savedBadge.style.display = 'none';
    stopLiveStream();
    lastLiveSnapshot = '';
    send({ type: 'clearSignature' });
    send({ type: 'strokeLive', points: [], phase: 'clear' });
  }

  function showKeyboard() {
    const input = document.getElementById('joinCodeInput');
    input.setAttribute('inputmode', 'numeric');
    input.focus();
  }

  function joinSession() {
    const code = document.getElementById('joinCodeInput').value.trim();
    if (!/^\d{4}$/.test(code)) {
      alert('담당자 화면에 표시된 4자리 코드를 입력해주세요.');
      return;
    }
    sessionCode = code;
    document.getElementById('sessionScreen').classList.add('hidden');
    document.getElementById('signScreen').classList.add('active');
    initSignaturePad();
    openWebSocket();
  }
  document.getElementById('joinCodeInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); joinSession(); }
  });

  // QR코드로 스캔해서 들어오면 ?code=1234 형태로 붙어있어서 자동 참가시킴
  (function autoJoinFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const codeFromUrl = params.get('code');
    if (codeFromUrl && /^\d{4}$/.test(codeFromUrl)) {
      document.getElementById('joinCodeInput').value = codeFromUrl;
      joinSession();
    }
  })();

  function openWebSocket() {
    setConnStatus(false, '연결 중');
    ws = new WebSocket(`${WS_URL_BASE}/ws?session=${sessionCode}`);

    ws.onopen = () => setConnStatus(true, '연결됨');
    ws.onclose = () => {
      if (intentionalDisconnect) { intentionalDisconnect = false; return; }
      setConnStatus(false, '재연결 중');
      setTimeout(openWebSocket, 2000);
    };
    ws.onerror = () => setConnStatus(false, '오류');

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === 'state') applyRemoteState(msg.data);
      else if (msg.type === 'submitted') onSubmitted(msg.result);
      else if (msg.type === 'error') showStatus(msg.message, 'err');
      else if (msg.type === 'hint' && msg.kind === 'openPhoneNumpad') openPhoneNumpad();
    };
  }

  function resetSession() {
    if (!confirm('다른 세션 코드로 바꿀까요? 지금 화면의 입력 내용은 사라져요.')) return;
    intentionalDisconnect = true;
    if (ws) ws.close();
    stopLiveStream();

    document.getElementById('signScreen').classList.remove('active');
    document.getElementById('sessionScreen').classList.remove('hidden');
    document.getElementById('joinCodeInput').value = '';
    sessionCode = null;
    remoteState = { 성명: '', 연락처: '', 재직자여부: '', signature: '', 동의: false };
    selectedCatButton = '';

    if (signaturePad) signaturePad.clear();
    placeholder.style.display = 'block';
    savedBadge.style.display = 'none';
    document.getElementById('whoName').textContent = '이름 입력 대기중...';
    document.getElementById('whoName').classList.add('placeholder-name');
    resetPhoneAndCatUI();
    showStatus('', '');
  }

  function resetPhoneAndCatUI() {
    document.getElementById('phoneVal').textContent = '숫자 키패드로 입력하기';
    document.getElementById('phoneVal').classList.add('empty');
    document.getElementById('catSection').classList.remove('show');
    ['재직자', '직업계고', '대학생', '일반시민'].forEach(c => {
      const el = document.getElementById(`catBtn-${c}`);
      if (el) el.classList.remove('active');
    });
  }

  function setConnStatus(on, text) {
    document.getElementById('connDot').className = 'dot ' + (on ? 'on' : 'off');
    document.getElementById('connText').textContent = text;
  }

  function send(payload) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(payload));
  }

  function applyRemoteState(data) {
    remoteState = data;
    const whoEl = document.getElementById('whoName');
    if (data.성명) {
      whoEl.textContent = `${data.성명}님, 입력해주세요`;
      whoEl.classList.remove('placeholder-name');
    } else {
      whoEl.textContent = '이름 입력 대기중...';
      whoEl.classList.add('placeholder-name');
    }

    // 연락처 표시 (팝업이 열려있는 동안엔 미리보기가 따로 갱신되므로 덮어쓰지 않음)
    const phoneValEl = document.getElementById('phoneVal');
    if (!numpadModalBackdrop.classList.contains('open')) {
      if (data.연락처) {
        phoneValEl.textContent = data.연락처;
        phoneValEl.classList.remove('empty');
      } else {
        phoneValEl.textContent = '숫자 키패드로 입력하기';
        phoneValEl.classList.add('empty');
      }
    }

    // 연락처가 한 번이라도 입력됐으면 소속 선택 영역 노출
    document.getElementById('catSection').classList.toggle('show', !!data.연락처);

    // 소속 하이라이트: 이 기기에서 직접 고른 버튼 기준(로컬), 없으면 카테고리 대분류만 반영
    if (!selectedCatButton && data.재직자여부) {
      ['재직자', '직업계고', '대학생', '일반시민'].forEach(c => {
        const el = document.getElementById(`catBtn-${c}`);
        if (!el) return;
        const matches = data.재직자여부 === '일반시민' ? c === '일반시민'
          : data.재직자여부 === '재직자' ? c === '재직자'
          : false; // 미래인재는 직업계고/대학생 중 어느쪽인지 원격 state만으로 알 수 없음
        el.classList.toggle('active', matches);
      });
    }
  }

  function onSubmitted(result) {
    showStatus(`제출 완료! (${result.sheetNumber}번째 시트, ${result.rowNumberInSheet}번째 줄) 🌸`, 'ok');
    signaturePad.clear();
    placeholder.style.display = 'block';
    savedBadge.style.display = 'none';
    selectedCatButton = '';
    resetPhoneAndCatUI();
  }

  function showStatus(text, cls) {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status' + (cls ? ' ' + cls : '');
  }

  // ---------- 소속 구분 선택 ----------
  function selectCat(cat) {
    selectedCatButton = cat;
    ['재직자', '직업계고', '대학생', '일반시민'].forEach(c => {
      document.getElementById(`catBtn-${c}`).classList.toggle('active', c === cat);
    });
    const stored = (cat === '직업계고' || cat === '대학생') ? '미래인재' : cat;
    send({ type: 'update', field: '재직자여부', value: stored });
    if (stored === '미래인재') send({ type: 'hint', kind: 'subCategory', value: cat });
  }

  // ---------- 연락처 전용 커스텀 숫자패드 (팝업 방식) ----------
  const numpadModalBackdrop = document.getElementById('numpadModalBackdrop');
  const numpadPreview = document.getElementById('numpadPreview');
  const phoneNumpad = document.getElementById('phoneNumpad');
  let phoneDraft = '';

  function openPhoneNumpad() {
    phoneDraft = (remoteState.연락처 && remoteState.연락처 !== '') ? remoteState.연락처 : '';
    updateNumpadPreview();
    numpadModalBackdrop.classList.add('open');
  }
  function closePhoneNumpad() {
    numpadModalBackdrop.classList.remove('open');
    const phoneValEl = document.getElementById('phoneVal');
    if (phoneDraft) {
      phoneValEl.textContent = phoneDraft;
      phoneValEl.classList.remove('empty');
      document.getElementById('catSection').classList.add('show');
    }
  }
  function updateNumpadPreview() {
    numpadPreview.textContent = phoneDraft || '010-0000-0000';
    numpadPreview.style.color = phoneDraft ? 'var(--text)' : '#c9a8b0';
  }

  phoneNumpad.querySelectorAll('.numpad-key').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.key;
      if (key === 'del') {
        phoneDraft = phoneDraft.slice(0, -1);
      } else {
        phoneDraft += key;
      }
      updateNumpadPreview();
      send({ type: 'update', field: '연락처', value: phoneDraft });
    });
  });
</script>

</body>
</html>
